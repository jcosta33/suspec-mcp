# The full verification gate: typecheck · lint · coverage · build — plus the fixture drift tripwire,
# which requires the real sibling suspec-cli checkout below.
name: gate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      canon_ref:
        description: suspec ref for an integration snapshot
        required: false
        default: main
      skills_ref:
        description: suspec-skills ref for an integration snapshot
        required: false
        default: main
      agents_ref:
        description: suspec-agents ref for an integration snapshot
        required: false
        default: main
      cli_ref:
        description: suspec-cli ref for an integration snapshot
        required: false
        default: main

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: repo
          persist-credentials: false

      # The real CLI: the fixture tripwire resolves any sibling whose package name is suspec-cli.
      - uses: actions/checkout@v4
        with:
          repository: jcosta33/suspec-cli
          ref: "${{ inputs.cli_ref || 'main' }}"
          path: suspec-cli
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install the sibling CLI's deps (the tripwire runs it)
        working-directory: suspec-cli
        run: |
          corepack enable
          pnpm install --frozen-lockfile --ignore-scripts

      - name: Gate
        working-directory: repo
        run: |
          corepack enable
          pnpm install --frozen-lockfile --ignore-scripts
          pnpm gate

  method-gates:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - { name: suspec-mcp, uses: actions/checkout@v4, with: { path: family/suspec-mcp } }
      - { name: suspec, uses: actions/checkout@v4, with: { repository: jcosta33/suspec, ref: "${{ inputs.canon_ref || 'main' }}", path: family/suspec } }
      - { name: suspec-skills, uses: actions/checkout@v4, with: { repository: jcosta33/suspec-skills, ref: "${{ inputs.skills_ref || 'main' }}", path: family/suspec-skills } }
      - { name: suspec-agents, uses: actions/checkout@v4, with: { repository: jcosta33/suspec-agents, ref: "${{ inputs.agents_ref || 'main' }}", path: family/suspec-agents } }
      - { name: suspec-cli, uses: actions/checkout@v4, with: { repository: jcosta33/suspec-cli, ref: "${{ inputs.cli_ref || 'main' }}", path: family/suspec-cli } }

      - name: Method gates
        run: sh family/suspec/scripts/lint-all.sh "$GITHUB_WORKSPACE/family"
